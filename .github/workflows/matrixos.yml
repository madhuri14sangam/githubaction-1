name: matrixos
on:
  push:
    branches: main
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [18,20,22]
        exclude:
          - os: windows-latest
            node-version: 22
    steps:
      - name: checkout code
        uses: actions/checkout@v7  
