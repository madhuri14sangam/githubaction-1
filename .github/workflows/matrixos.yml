name: matrixos
on:
  push:
    paths:
      - matrixos.yml
      - ".github/workflows/matrixos.yml"
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [18,20,22]
        exclude:
          - os: windows-latest
            node-version: 22
    steps:
      - name: checkout code
        uses: actions/checkout@v7  
      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Workflow Succeeded"
          to: madhuri14sangam@gmail.com
          from: GitHub Actions
          body: Workflow completed successfully.    
